<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Greenhouse Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#0b1220;color:#e5e7eb}

.layout{display:flex;height:100vh}
.sidebar{width:250px;background:#020617;padding:20px}
.sidebar h2{color:#22c55e;margin-bottom:25px}
.sidebar a{display:block;color:#94a3b8;margin:12px 0;text-decoration:none}
.sidebar a:hover{color:#22c55e}

.main{flex:1;display:flex;flex-direction:column}
header{background:#111827;padding:18px;display:flex;justify-content:space-between;align-items:center}
header span{color:#94a3b8}

.grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px}
.card{background:#1f2937;padding:20px;border-radius:12px}
.card h3{color:#22c55e;margin-bottom:8px}
.value{font-size:30px;font-weight:bold}
.stat{margin-top:8px}

input{width:100%;padding:8px;margin-top:10px;border:none;border-radius:6px;background:#111827;color:white}

.ok{color:#22c55e}.warn{color:#facc15}.danger{color:#ef4444}

.controls button{
 width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;
 background:#2563eb;color:white;cursor:pointer
}
.controls button.active{background:#22c55e}

.footer{padding:10px;text-align:center;background:#020617}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>Greenhouse IoT</h2>
  <a>Dashboard</a>
  <a>Environment</a>
  <a>Automation</a>
  <a>Reports</a>
  <a>Settings</a>
</div>

<div class="main">

<header>
  <div>Smart Greenhouse Pro Dashboard</div>
  <span id="time"></span>
</header>

<div class="grid">

<div class="card">
<h3>Temperature</h3>
<div class="value" id="tempD">25°C</div>
<input id="tempI" type="number" value="25" onchange="update('temp')">
<div id="tempS" class="stat"></div>
</div>

<div class="card">
<h3>Humidity</h3>
<div class="value" id="humD">60%</div>
<input id="humI" type="number" value="60" onchange="update('hum')">
<div id="humS" class="stat"></div>
</div>

<div class="card">
<h3>Soil Moisture</h3>
<div class="value" id="soilD">50%</div>
<input id="soilI" type="number" value="50" onchange="update('soil')">
<div id="soilS" class="stat"></div>
</div>

<div class="card">
<h3>Light Intensity</h3>
<div class="value" id="lightD">300 lux</div>
<input id="lightI" type="number" value="300" onchange="update('light')">
<div id="lightS" class="stat"></div>
</div>

<div class="card controls">
<h3>Automation Controls</h3>
<button onclick="toggle(this)">💧 Irrigation Pump</button>
<button onclick="toggle(this)">🌬 Ventilation Fan</button>
<button onclick="toggle(this)">💡 Grow Lights</button>
</div>

<div class="card">
<h3>System Overview</h3>
<div class="value">Active</div>
<p style="margin-top:10px;color:#94a3b8">All systems running normally</p>
</div>

</div>

<div class="footer">© 2026 Smart Greenhouse IoT Capstone System</div>

</div>
</div>

<script>
function update(type){
 updateTime();
 if(type==='temp'){
  let v=tempI.value; tempD.innerText=v+'°C'; set('tempS',v<35?'Optimal':(v<45?'Warning':'Overheat'));
 }
 if(type==='hum'){
  let v=humI.value; humD.innerText=v+'%'; set('humS',v<70?'Optimal':'Too High');
 }
 if(type==='soil'){
  let v=soilI.value; soilD.innerText=v+'%'; set('soilS',v<30?'Dry':(v<70?'Optimal':'Too Wet'));
 }
 if(type==='light'){
  let v=lightI.value; lightD.innerText=v+' lux'; set('lightS',v<200?'Low':(v<800?'Optimal':'Excess'));
 }
}

function set(id,val){
 let el=document.getElementById(id);
 el.innerText=val;
 el.className='stat '+(val==='Optimal'?'ok':val==='Warning'?'warn':'danger');
}

function toggle(btn){
 btn.classList.toggle('active');
 btn.innerText = btn.classList.contains('active') ? btn.innerText.replace('OFF','ON') : btn.innerText.replace('ON','OFF');
}

function updateTime(){
 time.innerText=new Date().toLocaleString();
}

update('temp');update('hum');update('soil');update('light');
</script>

</body>
</html>
